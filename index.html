<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random File Redirector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 2rem;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 1rem;
        }

        .message {
            color: #718096;
            font-size: 1rem;
            line-height: 1.6;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .file-info {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.875rem;
            color: #4a5568;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>🎲 Picking a random file...</h1>
        <p class="message">Please wait while we redirect you</p>
        <div id="fileInfo" class="file-info" style="display: none;"></div>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        async function redirectToRandomFile() {
            const errorDiv = document.getElementById('error');
            const fileInfoDiv = document.getElementById('fileInfo');

            try {
                // Fetch the files.json
                const response = await fetch('files.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const files = await response.json();
                
                if (files.length === 0) {
                    throw new Error('No files available');
                }
                
                // Pick a random file
                const randomIndex = Math.floor(Math.random() * files.length);
                const randomFile = files[randomIndex];
                
                // Show which file was selected
                fileInfoDiv.style.display = 'block';
                fileInfoDiv.textContent = `Selected: ${randomFile}`;
                
                // Redirect to the file
                // Using relative path since we're deployed at https://ryspare25.github.io/files7/
                setTimeout(() => {
                    window.location.href = `files/${encodeURIComponent(randomFile)}`;
                }, 500);
                
            } catch (err) {
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h1').textContent = '❌ Error';
                document.querySelector('.message').textContent = 'Failed to load files';
                errorDiv.style.display = 'block';
                errorDiv.textContent = err.message;
                console.error('Error loading files:', err);
            }
        }

        // Start the redirect process when page loads
        redirectToRandomFile();
    </script>
</body>
</html>
